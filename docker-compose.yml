version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dandori
      POSTGRES_PASSWORD: dandori
      POSTGRES_DB: dandori
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dandori"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DANDORI_DB_HOST: postgres
      DANDORI_DB_NAME: dandori
      DANDORI_DB_USER: dandori
      DANDORI_DB_PASSWORD: dandori
      DANDORI_LISTEN: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
